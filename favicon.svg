<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e95420" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#e95420" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#e95420" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fire" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e95420"/>
      <stop offset="50%" stop-color="#ff6f3c"/>
      <stop offset="100%" stop-color="#ffc93c"/>
    </linearGradient>
    <filter id="burn">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Outer glow -->
  <circle cx="32" cy="32" r="28" fill="url(#glow)"/>

  <!-- Orbital rings -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#e95420" stroke-width="0.8" opacity="0.2"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#e95420" stroke-width="0.5" opacity="0.15" stroke-dasharray="3 5"/>

  <!-- Ubuntu-style dots -->
  <circle cx="32" cy="9" r="4" fill="url(#fire)" filter="url(#burn)"/>
  <circle cx="12" cy="44" r="4" fill="url(#fire)" filter="url(#burn)"/>
  <circle cx="52" cy="44" r="4" fill="url(#fire)" filter="url(#burn)"/>

  <!-- Inner cores -->
  <circle cx="32" cy="9" r="1.8" fill="#000"/>
  <circle cx="12" cy="44" r="1.8" fill="#000"/>
  <circle cx="52" cy="44" r="1.8" fill="#000"/>

  <!-- Connecting arcs -->
  <path d="M 28 10 A 22 22 0 0 1 50 40" fill="none" stroke="#e95420" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M 14 40 A 22 22 0 0 1 30 9" fill="none" stroke="#e95420" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M 50 48 A 22 22 0 0 1 14 48" fill="none" stroke="#e95420" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- Skull crossbones -->
  <g transform="translate(32,30)" filter="url(#burn)">
    <!-- Skull -->
    <ellipse cx="0" cy="-2" rx="7" ry="8" fill="#e95420" opacity="0.9"/>
    <ellipse cx="0" cy="2" rx="5" ry="4" fill="#000" opacity="0.7"/>
    <circle cx="-3" cy="-3" r="2.2" fill="#000"/>
    <circle cx="3" cy="-3" r="2.2" fill="#000"/>
    <rect x="-1" y="3" width="0.8" height="2" rx="0.4" fill="#000" opacity="0.6"/>
    <rect x="0.5" y="3" width="0.8" height="2" rx="0.4" fill="#000" opacity="0.6"/>
    <!-- Crossbones -->
    <line x1="-10" y1="10" x2="10" y2="-2" stroke="#e95420" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="10" y1="10" x2="-10" y2="-2" stroke="#e95420" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <circle cx="-10" cy="10" r="1.5" fill="#e95420" opacity="0.7"/>
    <circle cx="10" cy="10" r="1.5" fill="#e95420" opacity="0.7"/>
    <circle cx="-10" cy="-2" r="1.5" fill="#e95420" opacity="0.7"/>
    <circle cx="10" cy="-2" r="1.5" fill="#e95420" opacity="0.7"/>
  </g>

  <!-- Outer ring glow -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#e95420" stroke-width="1.5" opacity="0.3"/>
  <circle cx="32" cy="32" r="31" fill="none" stroke="#ff6f3c" stroke-width="0.5" opacity="0.15"/>
</svg>
